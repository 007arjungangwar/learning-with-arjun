<!DOCTYPE html>
<html lang="en">
<head>

        .container {

        button {

</head>
<body>
    <div class="container">
        <h1>🔧 Reset Admin Credentials</h1>
        <p>Click below to set your email as the admin:</p>
        <p><strong>arjungangwariitpkd@gmail.com</strong></p>
        <button onclick="resetAdmin()">Reset Admin Now</button>

    <script>
        function resetAdmin() {
            // Force reset users with your email as admin
