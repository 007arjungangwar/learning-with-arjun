<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Admin | Manage Questions</title>
    <link rel="stylesheet" href="style.css">
    <script src="exam-data.js"></script>
    <script src="auth-check.js"></script>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #0066cc;
        }
        
        .question-editor {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .test-case-input {
            background: #f5f7fa;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 8px;
        }
        
        .results-table {
            width: 100%;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
        }
        
        th {
            background: #f5f7fa;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">📚 Arjun's Learning Hub</a>
            <div class="nav-links">
                <a href="index.html">🏠 Home</a>
                <a href="exam-admin.html">📊 Exam Admin</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="admin-container">
            <h1>📊 Exam Admin Dashboard</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalStudents">0</div>
                    <div>Students Attempted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgScore">0</div>
                    <div>Average Score (%)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="passRate">0</div>
                    <div>Pass Rate (%)</div>
                </div>
            </div>
            
            <div class="question-editor">
                <h3>✏️ Edit Questions</h3>
                <div id="questionsEditor"></div>
                <button onclick="saveQuestions()" class="btn-primary">💾 Save All Questions</button>
            </div>
            
            <div class="question-editor">
                <h3>📋 Student Results</h3>
                <div class="results-table" id="resultsTable"></div>
            </div>
        </div>
    </main>

    <footer>
        <p class="copyright">© 2024 | Exam Admin Panel</p>
    </footer>

    <script>
        // Check admin access
        const admin = getCurrentUser();
        if(!admin || admin.role !== 'admin') {
            alert('Admin access required!');
            window.location.href = 'login.html';
        }
        
        let questions = getExamQuestions();
        
        function loadStats() {
            const results = getExamResults();
            document.getElementById('totalStudents').innerHTML = results.length;
            
            if(results.length > 0) {
                const avg = results.reduce((sum, r) => sum + r.percentage, 0) / results.length;
                document.getElementById('avgScore').innerHTML = avg.toFixed(1);
                
                const passed = results.filter(r => r.percentage >= 40).length;
                document.getElementById('passRate').innerHTML = ((passed / results.length) * 100).toFixed(1);
            }
        }
        
        function loadQuestionsEditor() {
            const container = document.getElementById('questionsEditor');
            container.innerHTML = questions.map((q, idx) => `
                <div style="border: 1px solid #eaeaea; padding: 1rem; margin: 1rem 0; border-radius: 8px;">
                    <h4>Question ${idx + 1}</h4>
                    <input type="text" id="title_${q.id}" value="${q.title}" placeholder="Question Title" style="width: 100%; margin: 0.5rem 0; padding: 0.5rem;">
                    <textarea id="desc_${q.id}" rows="2" placeholder="Question Description" style="width: 100%; margin: 0.5rem 0; padding: 0.5rem;">${q.description}</textarea>
                    <input type="number" id="marks_${q.id}" value="${q.marks}" placeholder="Marks" style="width: 100px; margin: 0.5rem 0; padding: 0.5rem;">
                    
                    <h5>Test Cases:</h5>
                    <div id="testcases_${q.id}">
                        ${q.testCases.map((tc, tcIdx) => `
                            <div class="test-case-input">
                                <input type="text" id="input_${q.id}_${tcIdx}" value="${tc.input}" placeholder="Input" style="width: 45%; margin-right: 5%;">
                                <input type="text" id="expected_${q.id}_${tcIdx}" value="${tc.expected}" placeholder="Expected Output" style="width: 45%;">
                                <button onclick="removeTestCase(${q.id}, ${tcIdx})" style="background: #ff4444; color: white; border: none; padding: 0.25rem 0.5rem;">❌</button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addTestCase(${q.id})" class="btn-secondary">+ Add Test Case</button>
                </div>
            `).join('');
        }
        
        function addTestCase(questionId) {
            const container = document.getElementById(`testcases_${questionId}`);
            const tcIndex = container.children.length;
            const newDiv = document.createElement('div');
            newDiv.className = 'test-case-input';
            newDiv.innerHTML = `
                <input type="text" id="input_${questionId}_${tcIndex}" placeholder="Input" style="width: 45%; margin-right: 5%;">
                <input type="text" id="expected_${questionId}_${tcIndex}" placeholder="Expected Output" style="width: 45%;">
                <button onclick="removeTestCase(${questionId}, ${tcIndex})" style="background: #ff4444; color: white; border: none; padding: 0.25rem 0.5rem;">❌</button>
            `;
            container.appendChild(newDiv);
        }
        
        function removeTestCase(questionId, tcIndex) {
            const container = document.getElementById(`testcases_${questionId}`);
            if(container.children.length > 1) {
                container.removeChild(container.children[tcIndex]);
            } else {
                alert('At least one test case required!');
            }
        }
        
        function saveQuestions() {
            const updatedQuestions = questions.map(q => {
                const title = document.getElementById(`title_${q.id}`).value;
                const description = document.getElementById(`desc_${q.id}`).value;
                const marks = parseInt(document.getElementById(`marks_${q.id}`).value);
                
                const testCases = [];
                const testCaseContainer = document.getElementById(`testcases_${q.id}`);
                for(let i = 0; i < testCaseContainer.children.length; i++) {
                    const input = document.getElementById(`input_${q.id}_${i}`).value;
                    const expected = document.getElementById(`expected_${q.id}_${i}`).value;
                    if(input && expected) {
                        testCases.push({input, expected});
                    }
                }
                
                return {
                    ...q,
                    title: title,
                    description: description,
                    marks: marks,
                    testCases: testCases
                };
            });
            
            saveExamQuestions(updatedQuestions);
            questions = updatedQuestions;
            alert('Questions saved successfully!');
        }
        
        function loadResults() {
            const results = getExamResults();
            const container = document.getElementById('resultsTable');
            
            if(results.length === 0) {
                container.innerHTML = '<p>No exam results yet.</p>';
                return;
            }
            
            container.innerHTML = `
                 <table>
                    <thead>
                        <tr><th>Name</th><th>Application ID</th><th>Email</th><th>Score</th><th>Percentage</th><th>Status</th><th>Date</th></tr>
                    </thead>
                    <tbody>
                        ${results.map(r => `
                            <tr>
                                <td>${r.studentName}</td>
                                <td>${r.applicationId}</td>
                                <td>${r.email}</td>
                                <td>${r.totalMarks}/${r.maxMarks}</td>
                                <td>${r.percentage.toFixed(1)}%</td>
                                <td class="${r.percentage >= 40 ? 'pass' : 'fail'}">${r.percentage >= 40 ? '✅ Pass' : '❌ Fail'}</td>
                                <td>${new Date(r.endTime).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        loadStats();
        loadQuestionsEditor();
        loadResults();
    </script>
</body>
</html>
