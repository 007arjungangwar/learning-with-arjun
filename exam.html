<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Exam | Arjun's Learning Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="exam-data.js"></script>
    <style>
        .exam-container {
            display: flex;
            gap: 1rem;
            padding: 1rem;
        }
        
        .questions-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 1rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .code-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 1rem;
        }
        
        .question-card {
            background: #f9f9f9;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .question-card.active {
            background: #0066cc;
            color: white;
        }
        
        .question-card.answered {
            border-left: 4px solid #28a745;
        }
        
        .question-title {
            font-weight: bold;
        }
        
        .question-status {
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
        
        .code-editor {
            width: 100%;
            height: 300px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 1rem;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        
        .test-cases {
            margin-top: 1rem;
            padding: 1rem;
            background: #f5f7fa;
            border-radius: 8px;
        }
        
        .test-case {
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: white;
            border-radius: 4px;
        }
        
        .timer {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #ff4444;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            z-index: 100;
        }
        
        .submit-exam {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .exam-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">📚 Arjun's Learning Hub</a>
            <div class="nav-links">
                <a href="index.html">🏠 Home</a>
            </div>
        </div>
    </nav>

    <div class="timer" id="timer">45:00</div>

    <div class="exam-container">
        <div class="questions-panel">
            <h3>📋 Questions (6)</h3>
            <div id="questionsList"></div>
        </div>
        
        <div class="code-panel">
            <div id="currentQuestion"></div>
            <textarea id="codeEditor" class="code-editor" placeholder="Write your Python code here..."></textarea>
            <button onclick="saveAnswer()" style="margin-top: 0.5rem; padding: 0.5rem 1rem;">💾 Save Answer</button>
            
            <div class="test-cases">
                <h4>✅ Test Cases:</h4>
                <div id="testCases"></div>
            </div>
        </div>
    </div>

    <button class="submit-exam" onclick="submitExam()">📤 Submit Exam</button>

    <footer style="margin-top: 2rem;">
        <p class="copyright">© 2024 | Python Certification Exam</p>
    </footer>

    <script>
        // Check if exam session exists
        const examSession = JSON.parse(sessionStorage.getItem('examSession'));
        if(!examSession) {
            window.location.href = 'exam-login.html';
        }
        
        let questions = getExamQuestions();
        let currentQuestionIndex = 0;
        let answers = JSON.parse(sessionStorage.getItem('examAnswers') || '{}');
        let timerInterval;
        let timeLeft = 45 * 60; // 45 minutes in seconds
        
        // Load questions list
        function loadQuestionsList() {
            const container = document.getElementById('questionsList');
            container.innerHTML = questions.map((q, idx) => `
                <div class="question-card ${idx === currentQuestionIndex ? 'active' : ''} ${answers[q.id] ? 'answered' : ''}" onclick="loadQuestion(${idx})">
                    <div class="question-title">Q${idx + 1}. ${q.title}</div>
                    <div class="question-status">${answers[q.id] ? '✓ Answered' : '⏳ Pending'} | ${q.marks} marks</div>
                </div>
            `).join('');
        }
        
        // Load current question
        function loadQuestion(index) {
            currentQuestionIndex = index;
            const q = questions[index];
            
            document.getElementById('currentQuestion').innerHTML = `
                <h3>Q${index + 1}. ${q.title}</h3>
                <p>${q.description}</p>
                <p><strong>Marks: ${q.marks}</strong></p>
            `;
            
            document.getElementById('codeEditor').value = answers[q.id] || '# Write your code here\n\ndef solution(' + getFunctionParams(q) + '):\n    # Your code here\n    pass\n';
            
            // Show test cases
            document.getElementById('testCases').innerHTML = q.testCases.map(tc => `
                <div class="test-case">
                    <strong>Input:</strong> ${tc.input}<br>
                    <strong>Expected Output:</strong> ${tc.expected}
                </div>
            `).join('');
            
            loadQuestionsList();
        }
        
        function getFunctionParams(q) {
            const testCase = q.testCases[0];
            const inputs = testCase.input.split(',');
            return inputs.map((_, i) => `arg${i + 1}`).join(', ');
        }
        
        // Save answer
        function saveAnswer() {
            const q = questions[currentQuestionIndex];
            const code = document.getElementById('codeEditor').value;
            answers[q.id] = code;
            sessionStorage.setItem('examAnswers', JSON.stringify(answers));
            loadQuestionsList();
            alert('Answer saved!');
        }
        
        // Timer
        function startTimer() {
            timerInterval = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById('timer').innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        // Submit exam and evaluate
        function submitExam() {
            if(confirm('Are you sure you want to submit your exam?')) {
                clearInterval(timerInterval);
                
                // Evaluate all answers
                let totalMarks = 0;
                let results = [];
                
                for(let q of questions) {
                    const code = answers[q.id];
                    if(code) {
                        // Extract function code
                        let functionCode = code;
                        const evaluation = evaluateCode(functionCode, q.testCases, 'solution');
                        const marksObtained = (evaluation.passed / evaluation.total) * q.marks;
                        totalMarks += marksObtained;
                        
                        results.push({
                            questionId: q.id,
                            title: q.title,
                            marksObtained: marksObtained,
                            totalMarks: q.marks,
                            passedTests: evaluation.passed,
                            totalTests: evaluation.total,
                            testResults: evaluation.results
                        });
                    } else {
                        results.push({
                            questionId: q.id,
                            title: q.title,
                            marksObtained: 0,
                            totalMarks: q.marks,
                            passedTests: 0,
                            totalTests: q.testCases.length,
                            testResults: []
                        });
                    }
                }
                
                // Save result
                const examResult = {
                    studentName: examSession.name,
                    applicationId: examSession.applicationId,
                    email: examSession.email,
                    startTime: examSession.startTime,
                    endTime: new Date().toISOString(),
                    totalMarks: totalMarks,
                    maxMarks: 60,
                    percentage: (totalMarks / 60) * 100,
                    results: results,
                    answers: answers
                };
                
                saveExamResult(examResult);
                sessionStorage.setItem('examResult', JSON.stringify(examResult));
                sessionStorage.removeItem('examAnswers');
                sessionStorage.removeItem('examSession');
                
                window.location.href = 'exam-result.html';
            }
        }
        
        // Load first question
        loadQuestion(0);
        startTimer();
    </script>
</body>
</html>
